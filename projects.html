<!DOCTYPE html>
<!-- BUILD: projects (工事) v20260723P -->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>工事 ｜ 建設統合管理システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
  .addwrap{ display:flex; gap:6px; width:100%; align-items:center; }
  .addwrap select{ flex:1 1 auto; min-width:0; width:auto; }
  .newpt{ display:none; gap:6px; width:100%; margin-top:6px; }
  .newpt.open{ display:flex; }
  .newpt input{ flex:1 1 auto; min-width:0; width:auto; }

  /* ---------- 工事概要書 ---------- */
  .ovh{
    background:var(--ink); color:#DCE4EC; padding:12px 16px;
    display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
  }
  .ovh .no2{ font-family:var(--mono); font-size:12.5px; color:#A9BFD4; }
  .ovh h2{ font-family:var(--disp); font-weight:700; font-size:19px; margin:0; color:#fff; line-height:1.4; }
  .ovh .sp{ flex:1 1 0; }

  .ovsec{ margin-top:14px; }
  .ovsec > .t{
    font-family:var(--disp); font-weight:700; font-size:13.5px;
    padding:5px 0 5px 10px; border-left:4px solid var(--safety); margin-bottom:6px;
  }
  .ovtbl{ background:var(--card); border:1px solid var(--rule); border-radius:2px; }
  .ovr{ display:grid; grid-template-columns:136px 1fr; border-bottom:1px solid var(--rule-2); }
  .ovr:last-child{ border-bottom:none; }
  .ovr > .k{
    background:#F1F3EF; padding:9px 12px; font-size:12.5px; font-weight:700;
    color:var(--sub); border-right:1px solid var(--rule-2); display:flex; align-items:center;
  }
  .ovr > .v{ padding:9px 13px; font-size:14px; min-width:0; overflow-wrap:anywhere; }
  .ovr > .v.num{ font-family:var(--mono); }
  .ovr > .v .un{ color:var(--sub); font-size:12px; margin-left:4px; font-family:var(--body); }
  .ovr > .v.empty{ color:#9AA39C; }

  .ovpm{ width:100%; border-collapse:collapse; font-size:13px; background:var(--card);
         border:1px solid var(--rule); border-radius:2px; }
  .ovpm th{ background:#E3E6E0; text-align:left; padding:7px 11px; font-size:12px;
            font-family:var(--disp); border-bottom:1px solid var(--rule); }
  .ovpm td{ padding:7px 11px; border-bottom:1px solid var(--rule-2); vertical-align:top; }
  .ovpm tr:last-child td{ border-bottom:none; }
  .ovpm .mono{ font-family:var(--mono); font-size:12px; }

  .jump{ display:grid; gap:8px; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); }
  .jump a{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:var(--card); border:1px solid var(--rule); border-radius:2px;
    padding:11px 13px; text-decoration:none; color:inherit; min-height:var(--tap);
    font-family:var(--disp); font-weight:700; font-size:14px;
  }
  .jump a:hover{ border-color:var(--ink); }
  .jump a .c{ font-family:var(--mono); font-weight:400; font-size:12.5px; color:var(--sub); }

  /* ---------- 許認可の編集 ---------- */
  .pmrow{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:6px; }
  .pmrow select{ flex:1 1 200px; width:auto; min-width:0; }
  .pmrow .pno{ flex:1 1 150px; width:auto; min-width:0; }
  .pmrow .pdt{ flex:0 0 152px; width:152px; }
  .pmrow .pnt{ flex:1 1 140px; width:auto; min-width:0; }

  @media (max-width:560px){
    .ovr{ grid-template-columns:104px 1fr; }
    .ovr > .k{ padding:8px 10px; font-size:11.5px; }
    .ovr > .v{ padding:8px 11px; font-size:13.5px; }
  }
</style>
</head>
<body>

<header class="bar">
  <span class="mark" aria-hidden="true"></span>
  <h1>工事一覧</h1>
  <div class="who" id="who"></div>
  <button class="btn ghost sm barbtn" id="out">出る</button>
</header>

<div class="wrap">
  <div id="msg" class="msg"></div>

  <div class="toolbar">
    <input class="grow" type="text" id="q" placeholder="工事番号・工事名で絞り込み" inputmode="search">
    <select id="fst"><option value="">すべての状態</option></select>
  </div>

  <p class="count" id="count"></p>
  <div class="list" id="list"></div>
</div>

<div class="dock" id="dock" hidden>
  <div class="inner"><button class="btn wide" id="add">工事を登録する</button></div>
</div>

<!-- ========== 工事概要書 ========== -->
<div class="panel" id="ovp">
  <header class="bar">
    <span class="mark" aria-hidden="true"></span>
    <h1>工事概要</h1>
    <button class="btn ghost sm barbtn" id="ovedit" hidden>編集する</button>
    <button class="btn ghost sm barbtn" id="ovclose">閉じる</button>
  </header>
  <div class="wrap" id="ovbody"></div>
</div>

<!-- ========== 編集 ========== -->
<div class="panel" id="panel">
  <header class="bar">
    <span class="mark" aria-hidden="true"></span>
    <h1 id="ptitle">工事の登録</h1>
    <button class="btn ghost sm barbtn" id="close">閉じる</button>
  </header>

  <div class="wrap">
    <div id="pmsg" class="msg"></div>

    <div class="sheet">
      <div class="head">工事</div>
      <div class="row">
        <label for="f_no">工事番号<span class="req">*</span></label>
        <div class="fld"><input id="f_no" type="text" placeholder="2026-001"></div>
      </div>
      <div class="row">
        <label for="f_name">工事名<span class="req">*</span></label>
        <div class="fld"><input id="f_name" type="text" placeholder="（仮称）〇〇開発工事"></div>
      </div>
      <div class="row">
        <label for="f_type">工事種別</label>
        <div class="fld"><input id="f_type" type="text" placeholder="新規・既存・改修"></div>
      </div>
      <div class="row">
        <label for="f_status">状態</label>
        <div class="fld"><select id="f_status"></select></div>
      </div>
    </div>

    <div style="height:14px"></div>
    <div class="sheet">
      <div class="head">発注者</div>
      <div class="row">
        <label for="f_client">施主・元請</label>
        <div class="fld" style="flex-direction:column;align-items:stretch">
          <div class="addwrap">
            <select id="f_client"></select>
            <button class="btn ghost sm" id="ptadd" type="button" title="取引先を追加">＋</button>
          </div>
          <div class="newpt" id="newpt">
            <input id="f_ptname" type="text" placeholder="取引先の名称">
            <button class="btn sm" id="ptsave" type="button">登録</button>
          </div>
        </div>
      </div>
      <div class="row">
        <label for="f_cc">担当者</label>
        <div class="fld"><input id="f_cc" type="text"></div>
      </div>
      <div class="row">
        <label for="f_ctel">連絡先</label>
        <div class="fld"><input id="f_ctel" type="text" inputmode="tel"></div>
      </div>
    </div>

    <div style="height:14px"></div>
    <div class="sheet">
      <div class="head">場所と規模</div>
      <div class="row">
        <label for="f_addr">現場住所</label>
        <div class="fld"><input id="f_addr" type="text"></div>
      </div>
      <div class="row">
        <label for="f_lot">地番</label>
        <div class="fld"><input id="f_lot" type="text" placeholder="〇〇 1234-5 他3筆"></div>
      </div>
      <div class="row">
        <label for="f_area">施工面積</label>
        <div class="fld"><input id="f_area" type="number" step="0.01" min="0" placeholder="0"><span style="font-size:13px;color:var(--sub)">㎡</span></div>
      </div>
    </div>

    <div style="height:14px"></div>
    <div class="sheet">
      <div class="head">契約と工期</div>
      <div class="row">
        <label for="f_cdate">契約日</label>
        <div class="fld"><input id="f_cdate" type="date"></div>
      </div>
      <div class="row">
        <label for="f_amount">契約金額</label>
        <div class="fld"><input id="f_amount" type="number" step="1" min="0" placeholder="0"><span style="font-size:13px;color:var(--sub)">税抜</span></div>
      </div>
      <div class="row">
        <label for="f_start">着工日</label>
        <div class="fld"><input id="f_start" type="date"></div>
      </div>
      <div class="row">
        <label for="f_plan">完成予定</label>
        <div class="fld"><input id="f_plan" type="date"></div>
      </div>
      <div class="row">
        <label for="f_actual">完成日</label>
        <div class="fld"><input id="f_actual" type="date"></div>
      </div>
    </div>

    <div style="height:14px"></div>
    <div class="sheet">
      <div class="head">体制</div>
      <div class="row">
        <label for="f_agent">現場代理人</label>
        <div class="fld"><input id="f_agent" type="text"></div>
      </div>
      <div class="row">
        <label for="f_eng">主任技術者</label>
        <div class="fld"><input id="f_eng" type="text"></div>
      </div>
      <div class="row">
        <label for="f_mgr">現場担当</label>
        <div class="fld"><select id="f_mgr"></select></div>
      </div>
    </div>

    <div style="height:14px"></div>
    <div class="sheet">
      <div class="head">許認可</div>
      <div class="row" style="grid-template-columns:1fr">
        <div class="fld" style="flex-direction:column;align-items:stretch;padding:12px 14px">
          <div id="pms"></div>
          <button class="btn ghost sm" id="pmadd" type="button" style="margin-top:4px">＋ 許認可を足す</button>
        </div>
      </div>
    </div>

    <div style="height:14px"></div>
    <div class="sheet">
      <div class="head">その他</div>
      <div class="row">
        <label for="f_ins">保険・保証</label>
        <div class="fld"><input id="f_ins" type="text" placeholder="労災保険、建設工事保険 など"></div>
      </div>
      <div class="row">
        <label for="f_note">備考</label>
        <div class="fld"><textarea id="f_note"></textarea></div>
      </div>
    </div>

    <div style="height:16px"></div>
    <button class="btn danger" id="del" hidden>この工事を削除する</button>
  </div>

  <div class="dock" id="pdock">
    <div class="inner">
      <button class="btn ghost" id="cancel" style="flex:0 0 auto">やめる</button>
      <button class="btn wide" id="save">保存する</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="common.js"></script>
<script>
(async function(){
  const $ = id => document.getElementById(id);

  const auth = await requireAuth();
  if (!auth) return;
  const me = auth.me;
  const canEdit   = (me.role === 'admin' || me.role === 'manager');
  const canDelete = (me.role === 'admin');

  paintBar(me, await loadOrgName(me.organization_id));
  $('out').addEventListener('click', signOut);
  if (canEdit) $('dock').hidden = false;

  for (const [k,v] of Object.entries(STATUS)){
    $('fst').insertAdjacentHTML('beforeend', `<option value="${k}">${v}</option>`);
    $('f_status').insertAdjacentHTML('beforeend', `<option value="${k}">${v}</option>`);
  }

  let partners = [], users = [], pkinds = [], projects = [], editing = null;

  /* ================= 読み込み ================= */
  async function loadRefs(){
    const [p, u, k] = await Promise.all([
      sb.from('partners').select('id,name').eq('is_active', true).order('name'),
      sb.from('app_users').select('id,name,role').eq('is_active', true).order('name'),
      sb.from('permit_kinds').select('id,name').eq('is_active', true).order('sort_order')
    ]);
    if (p.error || u.error || k.error){
      const e = p.error || u.error || k.error;
      showMsg($('msg'),
        /column .* does not exist|schema cache/i.test(e.message || '')
          ? 'データベースに必要な列がまだありません。Supabase の SQL Editor で project_summary.sql を実行してください。'
          : '読み込めませんでした。' + e.message, 'err');
      return;
    }
    partners = p.data || []; users = u.data || []; pkinds = k.data || [];

    $('f_client').innerHTML = '<option value="">（未設定）</option>' +
      partners.map(x => `<option value="${x.id}">${esc(x.name)}</option>`).join('');
    $('f_mgr').innerHTML = '<option value="">（未設定）</option>' +
      users.filter(x => x.role !== 'member')
           .map(x => `<option value="${x.id}">${esc(x.name)}</option>`).join('');
  }

  async function loadProjects(){
    const { data, error } = await sb.from('projects').select('*')
      .eq('is_active', true).order('project_no', { ascending:false });
    if (error){ showMsg($('msg'), '工事を読み込めませんでした。' + error.message, 'err'); return; }
    projects = data || [];
    render();
  }

  function render(){
    const q  = $('q').value.trim().toLowerCase();
    const st = $('fst').value;
    const pmap = Object.fromEntries(partners.map(x => [x.id, x.name]));
    const umap = Object.fromEntries(users.map(x => [x.id, x.name]));

    const rows = projects.filter(p => {
      if (st && p.status !== st) return false;
      if (!q) return true;
      return (p.project_no||'').toLowerCase().includes(q) || (p.name||'').toLowerCase().includes(q);
    });

    $('count').textContent = `${rows.length} 件 ／ 全 ${projects.length} 件`;

    if (!rows.length){
      $('list').innerHTML = projects.length
        ? `<div class="empty"><b>該当する工事がありません</b>絞り込みの条件を変えてください。</div>`
        : `<div class="empty"><b>まだ工事がありません</b>${canEdit ? '下の「工事を登録する」から始めてください。' : '現場監督が登録すると、ここに表示されます。'}</div>`;
      return;
    }

    $('list').innerHTML = rows.map(p => {
      const meta = [];
      if (pmap[p.client_partner_id]) meta.push(esc(pmap[p.client_partner_id]));
      if (umap[p.manager_user_id])   meta.push('担当 ' + esc(umap[p.manager_user_id]));
      if (p.start_date || p.end_date_planned)
        meta.push(`${fmtDate(p.start_date)||'—'} 〜 ${fmtDate(p.end_date_planned)||'—'}`);
      if (Number(p.contract_amount) > 0)
        meta.push(`<span class="amt">${fmtMoney(p.contract_amount)}</span>`);

      return `<button class="item" data-id="${p.id}">
        <span class="flag fl-${p.status}"></span>
        <span class="body">
          <span class="no">${esc(p.project_no)}</span>
          <span class="nm">${esc(p.name)}</span>
          <span class="meta">${meta.map(m => `<span>${m}</span>`).join('')}</span>
        </span>
        <span class="side"><span class="tag st-${p.status}">${STATUS[p.status]||p.status}</span></span>
      </button>`;
    }).join('');

    $('list').querySelectorAll('.item').forEach(b =>
      b.addEventListener('click', () => openOverview(projects.find(x => x.id === b.dataset.id))));
  }

  $('q').addEventListener('input', render);
  $('fst').addEventListener('change', render);

  /* ================= 工事概要書 ================= */
  function row(k, v, cls){
    const has = v !== null && v !== undefined && v !== '';
    return `<div class="ovr"><span class="k">${k}</span>` +
           `<span class="v ${cls||''}${has ? '' : ' empty'}">${has ? v : '—'}</span></div>`;
  }

  async function openOverview(p){
    if (!p) return;
    editing = p;
    const pmap = Object.fromEntries(partners.map(x => [x.id, x.name]));
    const umap = Object.fromEntries(users.map(x => [x.id, x.name]));

    const [ph, dr, pf] = await Promise.all([
      sb.from('project_phases').select('id', { count:'exact', head:true })
        .eq('project_id', p.id).eq('is_active', true),
      sb.from('daily_reports').select('id', { count:'exact', head:true })
        .eq('project_id', p.id).eq('is_active', true),
      sb.from('project_files').select('id', { count:'exact', head:true })
        .eq('project_id', p.id).eq('is_active', true)
    ]);

    const amt  = Number(p.contract_amount) || 0;
    const rate = Number(p.tax_rate ?? 0.1);
    const tax  = Math.floor(amt * rate);

    const pms = Array.isArray(p.permits) ? p.permits : [];
    const pmHtml = pms.length
      ? `<table class="ovpm"><thead><tr><th>種類</th><th>番号</th><th>取得日</th><th>備考</th></tr></thead><tbody>` +
        pms.map(x => `<tr><td>${esc(x.kind||'')}</td><td class="mono">${esc(x.no||'')}</td>` +
          `<td class="mono">${x.date ? fmtDate(x.date) : ''}</td><td>${esc(x.note||'')}</td></tr>`).join('') +
        `</tbody></table>`
      : `<div class="ovtbl"><div class="ovr"><span class="k">許認可</span><span class="v empty">登録されていません</span></div></div>`;

    $('ovbody').innerHTML = `
      <div class="ovh">
        <span class="no2">${esc(p.project_no)}</span>
        <h2>${esc(p.name)}</h2>
        <span class="sp"></span>
        <span class="tag st-${p.status}" style="background:#fff">${STATUS[p.status]||p.status}</span>
      </div>

      <div class="ovsec"><div class="t">発注者</div><div class="ovtbl">
        ${row('施主・元請', esc(pmap[p.client_partner_id]||''))}
        ${row('担当者', esc(p.client_contact||''))}
        ${row('連絡先', esc(p.client_tel||''), 'num')}
      </div></div>

      <div class="ovsec"><div class="t">場所と規模</div><div class="ovtbl">
        ${row('現場住所', esc(p.site_address||''))}
        ${row('地番', esc(p.site_lot||''))}
        ${row('施工面積', p.site_area ? Number(p.site_area).toLocaleString('ja-JP') + '<span class="un">㎡</span>' : '', 'num')}
        ${row('工事種別', esc(p.construction_type||''))}
      </div></div>

      <div class="ovsec"><div class="t">契約</div><div class="ovtbl">
        ${row('契約日', p.contract_date ? fmtDate(p.contract_date) : '', 'num')}
        ${row('契約金額（税抜）', amt ? fmtMoney(amt) : '', 'num')}
        ${row('消費税', amt ? fmtMoney(tax) + `<span class="un">${(rate*100).toFixed(0)}%</span>` : '', 'num')}
        ${row('税込', amt ? fmtMoney(amt + tax) : '', 'num')}
      </div></div>

      <div class="ovsec"><div class="t">工期</div><div class="ovtbl">
        ${row('着工日', p.start_date ? fmtDate(p.start_date) : '', 'num')}
        ${row('完成予定', p.end_date_planned ? fmtDate(p.end_date_planned) : '', 'num')}
        ${row('完成日', p.end_date_actual ? fmtDate(p.end_date_actual) : '', 'num')}
        ${row('工程表', `第 ${p.schedule_version ?? 1} 版　${p.schedule_revised_on ? fmtDate(p.schedule_revised_on) : ''}`, 'num')}
      </div></div>

      <div class="ovsec"><div class="t">体制</div><div class="ovtbl">
        ${row('現場代理人', esc(p.agent_name||''))}
        ${row('主任技術者', esc(p.engineer_name||''))}
        ${row('現場担当', esc(umap[p.manager_user_id]||''))}
      </div></div>

      <div class="ovsec"><div class="t">許認可</div>${pmHtml}</div>

      <div class="ovsec"><div class="t">その他</div><div class="ovtbl">
        ${row('保険・保証', esc(p.insurance_note||''))}
        ${row('備考', esc(p.note||'').replace(/\n/g,'<br>'))}
      </div></div>

      <div class="ovsec"><div class="t">この工事の記録</div>
        <div class="jump">
          <a href="schedule.html?p=${p.id}">工程表 <span class="c">${ph.count ?? 0} 工程</span></a>
          <a href="reports.html?p=${p.id}">日報 <span class="c">${dr.count ?? 0} 件</span></a>
          <a href="files.html?p=${p.id}">写真・書類 <span class="c">${pf.count ?? 0} 件</span></a>
        </div>
      </div>
      <div style="height:26px"></div>`;

    $('ovedit').hidden = !canEdit;
    $('ovp').classList.add('open');
    window.scrollTo(0,0);
  }

  $('ovclose').addEventListener('click', () => { $('ovp').classList.remove('open'); editing = null; });
  $('ovedit').addEventListener('click', () => { $('ovp').classList.remove('open'); openPanel(editing); });

  /* ================= 許認可の編集 ================= */
  function pmRow(v){
    const known = pkinds.some(k => k.name === (v && v.kind));
    const opt = '<option value="">（種類を選ぶ）</option>' +
      pkinds.map(k => `<option value="${esc(k.name)}"${v && v.kind === k.name ? ' selected' : ''}>${esc(k.name)}</option>`).join('') +
      (v && v.kind && !known ? `<option value="${esc(v.kind)}" selected>${esc(v.kind)}</option>` : '');
    return `<div class="pmrow">
      <select class="p_kind">${opt}</select>
      <input class="pno p_no" type="text" placeholder="番号" value="${esc((v&&v.no)||'')}">
      <input class="pdt p_dt" type="date" value="${esc((v&&v.date)||'')}">
      <input class="pnt p_nt" type="text" placeholder="備考" value="${esc((v&&v.note)||'')}">
      <button class="btn ghost sm p_rm" type="button">削除</button>
    </div>`;
  }
  function bindPmRm(){
    $('pms').querySelectorAll('.p_rm').forEach(b => b.onclick = () => b.closest('.pmrow').remove());
  }
  $('pmadd').addEventListener('click', () => {
    $('pms').insertAdjacentHTML('beforeend', pmRow(null)); bindPmRm();
  });

  /* ================= 編集 ================= */
  function openPanel(p){
    editing = p || null;
    showMsg($('pmsg'), '');
    $('newpt').classList.remove('open');

    $('ptitle').textContent = p ? '工事の編集' : '工事の登録';
    $('f_no').value     = p ? (p.project_no||'') : '';
    $('f_name').value   = p ? (p.name||'') : '';
    $('f_type').value   = p ? (p.construction_type||'') : '';
    $('f_status').value = p ? p.status : 'estimate';
    $('f_client').value = p ? (p.client_partner_id||'') : '';
    $('f_cc').value     = p ? (p.client_contact||'') : '';
    $('f_ctel').value   = p ? (p.client_tel||'') : '';
    $('f_addr').value   = p ? (p.site_address||'') : '';
    $('f_lot').value    = p ? (p.site_lot||'') : '';
    $('f_area').value   = p && p.site_area ? p.site_area : '';
    $('f_cdate').value  = p ? (p.contract_date||'') : '';
    $('f_amount').value = p && Number(p.contract_amount) ? p.contract_amount : '';
    $('f_start').value  = p ? (p.start_date||'') : '';
    $('f_plan').value   = p ? (p.end_date_planned||'') : '';
    $('f_actual').value = p ? (p.end_date_actual||'') : '';
    $('f_agent').value  = p ? (p.agent_name||'') : '';
    $('f_eng').value    = p ? (p.engineer_name||'') : '';
    $('f_mgr').value    = p ? (p.manager_user_id||'') : '';
    $('f_ins').value    = p ? (p.insurance_note||'') : '';
    $('f_note').value   = p ? (p.note||'') : '';

    const pms = (p && Array.isArray(p.permits)) ? p.permits : [];
    $('pms').innerHTML = pms.map(pmRow).join('');
    bindPmRm();

    document.querySelectorAll('#panel input, #panel select, #panel textarea')
      .forEach(el => el.disabled = !canEdit);
    $('pdock').style.display = canEdit ? '' : 'none';
    $('ptadd').disabled = !canEdit;
    $('pmadd').disabled = !canEdit;
    $('del').hidden = !(p && canDelete);

    $('panel').classList.add('open');
    window.scrollTo(0,0);
  }
  function closePanel(){ $('panel').classList.remove('open'); }

  $('add').addEventListener('click', () => { editing = null; openPanel(null); });
  $('close').addEventListener('click', () => { closePanel(); if (editing) openOverview(editing); });
  $('cancel').addEventListener('click', () => { closePanel(); if (editing) openOverview(editing); });

  /* ================= 取引先のその場追加 ================= */
  $('ptadd').addEventListener('click', () => {
    $('newpt').classList.toggle('open');
    if ($('newpt').classList.contains('open')) $('f_ptname').focus();
  });
  $('ptsave').addEventListener('click', async () => {
    const nm = $('f_ptname').value.trim();
    if (!nm){ showMsg($('pmsg'), '取引先の名称を入力してください。', 'err'); return; }
    const { data, error } = await sb.from('partners')
      .insert({ organization_id: me.organization_id, name: nm, partner_type: 'client' })
      .select('id,name').single();
    if (error){ showMsg($('pmsg'), '登録できませんでした。' + error.message, 'err'); return; }
    await loadRefs();
    $('f_client').value = data.id;
    $('f_ptname').value = '';
    $('newpt').classList.remove('open');
    showMsg($('pmsg'), `取引先「${data.name}」を登録しました。`, 'ok');
  });

  /* ================= 保存 ================= */
  $('save').addEventListener('click', async () => {
    showMsg($('pmsg'), '');
    const no = $('f_no').value.trim(), name = $('f_name').value.trim();
    if (!no){ showMsg($('pmsg'), '工事番号を入力してください。', 'err'); $('f_no').focus(); return; }
    if (!name){ showMsg($('pmsg'), '工事名を入力してください。', 'err'); $('f_name').focus(); return; }

    const permits = [...$('pms').querySelectorAll('.pmrow')].map(r => ({
      kind: r.querySelector('.p_kind').value,
      no  : r.querySelector('.p_no').value.trim(),
      date: r.querySelector('.p_dt').value,
      note: r.querySelector('.p_nt').value.trim()
    })).filter(x => x.kind || x.no || x.date || x.note);

    const body = {
      organization_id  : me.organization_id,
      project_no       : no,
      name             : name,
      construction_type: $('f_type').value.trim() || null,
      status           : $('f_status').value,
      client_partner_id: $('f_client').value || null,
      client_contact   : $('f_cc').value.trim() || null,
      client_tel       : $('f_ctel').value.trim() || null,
      site_address     : $('f_addr').value.trim() || null,
      site_lot         : $('f_lot').value.trim() || null,
      site_area        : $('f_area').value === '' ? null : Number($('f_area').value),
      contract_date    : $('f_cdate').value || null,
      contract_amount  : $('f_amount').value === '' ? 0 : Number($('f_amount').value),
      start_date       : $('f_start').value || null,
      end_date_planned : $('f_plan').value || null,
      end_date_actual  : $('f_actual').value || null,
      agent_name       : $('f_agent').value.trim() || null,
      engineer_name    : $('f_eng').value.trim() || null,
      manager_user_id  : $('f_mgr').value || null,
      permits          : permits,
      insurance_note   : $('f_ins').value.trim() || null,
      note             : $('f_note').value.trim() || null
    };

    $('save').disabled = true; $('save').textContent = '保存しています…';
    let error, id = editing ? editing.id : null;
    if (editing){
      ({ error } = await sb.from('projects').update(body).eq('id', editing.id));
    } else {
      const r = await sb.from('projects').insert(body).select('id').single();
      error = r.error; id = r.data ? r.data.id : null;
    }
    $('save').disabled = false; $('save').textContent = '保存する';

    if (error){
      showMsg($('pmsg'), error.code === '23505' ? 'その工事番号は既に使われています。'
        : error.code === '42501' ? 'この操作を行う権限がありません。'
        : '保存できませんでした。' + error.message, 'err');
      return;
    }

    closePanel();
    await loadProjects();
    const fresh = projects.find(x => x.id === id);
    if (fresh) openOverview(fresh);
    showMsg($('msg'), '保存しました。', 'ok');
  });

  /* ================= 削除 ================= */
  $('del').addEventListener('click', async () => {
    if (!editing) return;
    if (!confirm(`「${editing.name}」を削除します。\n工程・日報・写真もまとめて消えます。取り消せません。`)) return;
    const { error } = await sb.from('projects').delete().eq('id', editing.id);
    if (error){ showMsg($('pmsg'), '削除できませんでした。' + error.message, 'err'); return; }
    closePanel(); editing = null;
    await loadProjects();
    showMsg($('msg'), '工事を削除しました。', 'ok');
  });

  /* ================= 起動 ================= */
  await loadRefs();
  await loadProjects();
})();
</script>
</body>
</html>
