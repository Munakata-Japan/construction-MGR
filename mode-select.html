<style>
  html,body{ height:100%; }
  body{ display:flex; flex-direction:column; }

  .stage{
    flex:1 1 auto; display:flex;
    padding:clamp(16px,3vh,34px) clamp(12px,3vw,28px);
  }
  /* margin:auto なら内容が高くても上が切れずに中央へ寄る */
  .frame{ margin:auto; width:100%; max-width:1160px; }

  /* 図面の枠に倣った二重線 */
  .frame .outer{ border:2px solid var(--ink); border-radius:3px; padding:5px; }
  .frame .inner{
    border:1px solid var(--rule); border-radius:2px;
    padding:clamp(16px,2.4vw,26px);
  }

  .frame .hud{ margin-bottom:20px; }
  .frame .grp:first-of-type{ margin-top:0; }
  .frame .grp{ margin:22px 0 11px; }
  .frame .modes{ grid-template-columns:repeat(auto-fill, minmax(196px, 1fr)); }
  .frame .foot{ margin:14px 0 0; }

  @media (max-width:700px){
    .stage{ padding:14px 10px; }
    .frame .outer{ padding:4px; }
    .frame .inner{ padding:14px; }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="common.js"></script>
<script>
(async function(){
  const $ = id => document.getElementById(id);

  const auth = await requireAuth();
  if (!auth) return;
  const me = auth.me;

  paintBar(me, await loadOrgName(me.organization_id));
  $('out').addEventListener('click', signOut);

  // 権限に応じて表示を絞る
  const rank = { member:0, manager:1, admin:2 };
  document.querySelectorAll('.mode[data-role]').forEach(el => {
    if (rank[me.role] < rank[el.dataset.role]) el.remove();
  });
  // 中身が空になった群は見出しごと隠す
  document.querySelectorAll('.modes').forEach(box => {
    if (!box.children.length){
      box.previousElementSibling?.remove();
      box.remove();
    }
  });

  // 現況
  const { data, error } = await sb.from('projects')
    .select('status').eq('is_active', true).eq('is_sample', false);

  if (error){
    $('h_sys').textContent = '不通';
    $('h_sys').classList.add('ng');
    showMsg($('msg'), '工事の件数を取得できませんでした。' + error.message, 'err');
    return;
  }

  const all  = data.length;
  const run  = data.filter(p => p.status === 'started').length;
  const done = data.filter(p => ['completed','invoiced','paid'].includes(p.status)).length;

  $('h_all').textContent  = all;
  $('h_run').textContent  = run;
  $('h_done').textContent = done;
  $('h_sys').textContent  = '正常';
  $('h_sys').classList.add('ok');

  // 保管量（無料プランの上限 1GB）
  const LIMIT = 1024 * 1024 * 1024;
  const st = await sb.rpc('storage_used');
  if (!st.error && st.data){
    const b = Number(st.data.bytes) || 0;
    const n = Number(st.data.files) || 0;
    const pct = Math.min(100, b / LIMIT * 100);
    const mb = b / 1024 / 1024;
    $('h_st').textContent  = `${mb.toFixed(1)}`;
    $('h_sub').textContent = `/ 1024 MB ・ ${n}件`;
    $('h_bar').style.width = Math.max(1.5, pct).toFixed(1) + '%';

    const lv = pct >= 80 ? 'full' : (pct >= 50 ? 'warn' : '');
    if (lv){ $('h_st').classList.add(lv); $('h_bar').classList.add(lv); }

    if (pct >= 80){
      showMsg($('msg'),
        '保管領域が残り少なくなっています。上限に達すると、写真だけでなく工事や日報の保存もできなくなります。' +
        '古い資料の整理か、有料プランへの切り替えをご検討ください。', 'err');
    } else if (pct >= 50){
      showMsg($('msg'), `保管領域を ${pct.toFixed(0)}% 使っています。`, 'err');
    }
  }
})();
</script>
</body>
</html>
